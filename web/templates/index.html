<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 음악 추천 엔진</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <!-- 헤더 -->
        <header class="header">
            <div class="header-content">
                <h1>🎵 Music Recommender</h1>
                <p class="subtitle">시드곡을 선택하면 맞춤 플레이리스트를 생성하고, YouTube Music에 바로 등록합니다</p>
            </div>
        </header>

        <!-- 메인 -->
        <main class="main">
            <!-- 시드곡 선택 -->
            <section class="card seed-section">
                <h2>🎯 시드곡 선택</h2>
                <div class="search-box">
                    <input type="text" id="seedSearch" placeholder="곡 제목이나 아티스트를 검색하세요..." autocomplete="off">
                    <div id="searchResults" class="search-results hidden"></div>
                </div>
                <div id="selectedSeed" class="selected-seed hidden">
                    <div class="seed-info">
                        <span class="seed-title"></span>
                        <span class="seed-artist"></span>
                    </div>
                    <button class="btn-clear" onclick="clearSeed()">✕</button>
                </div>
                <div class="controls">
                    <label>곡 수: <input type="number" id="songCount" value="25" min="5" max="50"></label>
                    <button id="generateBtn" class="btn btn-primary" onclick="generatePlaylist()" disabled>
                        플레이리스트 생성
                    </button>
                </div>
            </section>

            <!-- 로딩 -->
            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p id="loadingText">추천 플레이리스트 생성 중...</p>
            </div>

            <!-- 플레이리스트 결과 -->
            <section id="playlistSection" class="card playlist-section hidden">
                <div class="playlist-header">
                    <h2>📋 추천 플레이리스트</h2>
                    <div class="playlist-actions">
                        <input type="text" id="playlistName" placeholder="플레이리스트 이름" value="추천 플레이리스트">
                        <button id="ytmBtn" class="btn btn-youtube" onclick="pushToYTMusic()" disabled>
                            ▶ YouTube Music에 등록
                        </button>
                    </div>
                </div>
                <div id="playlistBody" class="playlist-body"></div>
            </section>

            <!-- 결과 -->
            <div id="resultMessage" class="result-message hidden"></div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
